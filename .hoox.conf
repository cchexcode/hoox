version = "0.0.0"

// Shared command definitions — reuse via HOCON substitutions
_shared {
  cargo_fmt = "cargo +nightly fmt --all -- --check"
  cargo_build = "cargo build --all-features"
  cargo_test = "cargo test --all"
  cargo_doc = "cargo doc --no-deps"
  cargo_all = """set -e
cargo build --all-features
cargo test --all
cargo doc --no-deps"""
}

// Include per-package configs (paths relative to repo root)
// include = ["crates/api/.hoox.conf", "packages/web/.hoox.conf"]

hooks {
  pre-commit = [
    // Format check — only when Rust files are staged
    {
      command.inline = ${_shared.cargo_fmt}
      files.glob = "**/*.rs"
    }

    // Build + test + doc — only when Rust files are staged
    {
      command.inline = ${_shared.cargo_all}
      files.glob = "**/*.rs"
    }

    // Example: regex file matching
    // {
    //   command.inline = "check-migrations"
    //   files.regex = "migrations/.*\\.sql$"
    // }

    // Example: both glob and regex (OR — runs if either matches)
    // {
    //   command.inline = "validate-schema"
    //   files { glob = "**/*.graphql", regex = "src/schema/.*\\.rs$" }
    // }

    // Example: run in a specific directory (monorepo)
    // {
    //   command.inline = "npm test"
    //   cwd = "packages/web"
    //   files.glob = "packages/web/**"
    // }

    // Example: parallel execution — consecutive parallel=true commands run concurrently
    // {
    //   command.inline = "cargo test"
    //   cwd = "crates/api"
    //   files.glob = "crates/api/**/*.rs"
    //   parallel = true
    // }
    // {
    //   command.inline = "npm test"
    //   cwd = "packages/web"
    //   files.glob = "packages/web/**"
    //   parallel = true
    // }

    // Example: use stdin JSON to lint only changed files
    // Each entry has { path, type } — type is added/modified/deleted/renamed/copied
    // {
    //   command.inline = "cat | jq -r '.[].path' | xargs prettier --check"
    //   files.glob = ["**/*.js", "**/*.ts", "**/*.css"]
    // }

    // Example: custom environment — keep only matching vars, add extras
    // {
    //   command.inline = "npm test"
    //   cwd = "packages/web"
    //   env {
    //     keep = ["PATH", "HOME", "NODE_.*", "NPM_.*"]
    //     vars { NODE_ENV = "test", CI = "true" }
    //   }
    // }

    // Example: script file with custom program
    // {
    //   command.file = "./scripts/lint.py"
    //   program = ["python3", "-c"]
    //   files.glob = "**/*.py"
    //   verbosity = stderr
    //   severity = warn
    // }
  ]

  pre-push = [
    {
      command.inline = ${_shared.cargo_fmt}
      files.glob = "**/*.rs"
    }
    {
      command.inline = ${_shared.cargo_all}
      files.glob = "**/*.rs"
    }
  ]

  // Example: prepare-commit-msg — set a default commit message template
  // prepare-commit-msg = [
  //   {
  //     command.inline = """
  //       COMMIT_MSG_FILE=$1
  //       echo "Work in progress" > $COMMIT_MSG_FILE"""
  //   }
  // ]
}

// Note: HOOX_CHANGED_FILES env var is always available in every command
// (newline-separated list of matched changed files)
