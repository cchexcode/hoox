// Shared command definitions (use HOCON substitutions to reuse)
_shared {
  cargo_fmt_check = "cargo +nightly fmt --all -- --check"
  cargo_test = "cargo test --all"
}

hooks {
  pre-commit = [
    {
      command.inline = ${_shared.cargo_fmt_check}
      files.glob = "**/*.rs"
    }
    {
      command.inline = ${_shared.cargo_test}
      files.glob = "**/*.rs"
    }
    {
      command.inline = "cargo doc --no-deps"
      files.glob = "**/*.rs"
      verbosity = stderr
      severity = warn
    }
  ]
  pre-push = [
    {
      command.inline = ${_shared.cargo_fmt_check}
      files.glob = "**/*.rs"
    }
    {
      command.inline = ${_shared.cargo_test}
      files.glob = "**/*.rs"
    }
  ]
}
